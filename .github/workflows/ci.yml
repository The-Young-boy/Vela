name: CI

# Builds the APK (and runs unit tests) on every push to main and on PRs. The
# release APK is uploaded as a downloadable artifact on each run. Mirrors the
# Arcana/Callguard build setup; tag releases are handled by release.yml.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (optional)
        # If the secret isn't set the release APK is debug-signed — still
        # installable for testing. app/build.gradle.kts handles the fallback.
        env:
          KEYSTORE_B64: ${{ secrets.VELA_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/vela-release.jks"
            echo "Decoded release keystore."
          else
            echo "No keystore secret — release APK will be debug-signed."
          fi

      - name: Unit tests
        run: ./gradlew :core:test --no-daemon

      - name: Build release APK
        env:
          VELA_KEYSTORE_PATH: ${{ runner.temp }}/vela-release.jks
          VELA_KEYSTORE_PASSWORD: ${{ secrets.VELA_KEYSTORE_PASSWORD }}
          VELA_KEY_ALIAS: ${{ secrets.VELA_KEY_ALIAS }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vela-maps-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
